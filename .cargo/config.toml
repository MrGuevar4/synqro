[build]
# Enforce full RELRO and BIND_NOW for all targets by default
rustflags = [
  "-C", "relro-level=full",
  "-C", "link-arg=-Wl,-z,now",
]

[target.x86_64-unknown-linux-musl]
rustflags = [
  "-C", "target-feature=+crt-static",
  "-C", "relro-level=full",
  "-C", "link-arg=-Wl,-z,now",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "relro-level=full",
  "-C", "link-arg=-Wl,-z,now",
]

[net]
git-fetch-with-cli = true
