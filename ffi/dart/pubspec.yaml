repository: https://github.com/synqro/synqro/tree/main/ffi/dart
issue_tracker: https://github.com/synqro/synqro/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  ffi: ^2.1.0

dev_dependencies:
  lints: ^3.0.0
